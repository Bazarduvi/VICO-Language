<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jyutping AI Dictionary - OS Duvi</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/leader-line-new@1.1.9/leader-line.min.js"></script>

    <style>    
:root {
    --primary: #007AFF;
    --bg-color: #f4f4f9;
    --text-color: #333;
    --card-bg: #fff;
    /* Colores para los 6 tonos del Jyutping */
    --t1: #FF3B30; /* Tono 1 - Rojo */
    --t2: #FF9500; /* Tono 2 - Naranja */
    --t3: #FFCC00; /* Tono 3 - Amarillo */
    --t4: #4CD964; /* Tono 4 - Verde */
    --t5: #5AC8FA; /* Tono 5 - Azul claro */
    --t6: #5856D6; /* Tono 6 - Morado */
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 0;
}

header {
    background-color: var(--card-bg);
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

main {
    padding: 20px;
    max-width: 600px;
    margin: 0 auto;
}

textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.api-selector {
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
}

.btn-primary { background-color: var(--primary); color: white; }
.btn-secondary { background-color: #E5E5EA; color: #333; width: auto; font-size: 14px;}
.btn-danger { background-color: #FF3B30; color: white; width: auto; font-size: 12px;}

.visual-map-section {
    margin: 20px 0;
    padding: 20px;
    background: var(--card-bg);
    border-radius: 8px;
    min-height: 100px;
    position: relative;
    display: flex;
    justify-content: space-between;
}

.output-section {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.lang-row { margin-bottom: 10px; font-size: 18px; }

/* Clases para inyectar con JS según el tono */
.jyut-t1 { color: var(--t1); font-weight: bold; }
.jyut-t2 { color: var(--t2); font-weight: bold; }
.jyut-t3 { color: var(--t3); font-weight: bold; }
.jyut-t4 { color: var(--t4); font-weight: bold; }
.jyut-t5 { color: var(--t5); font-weight: bold; }
.jyut-t6 { color: var(--t6); font-weight: bold; }

.history-section { margin-top: 30px; }
.history-header { display: flex; justify-content: space-between; align-items: center; }
#historyList { list-style: none; padding: 0; }
#historyList li { background: var(--card-bg); padding: 10px; margin-bottom: 8px; border-radius: 5px; }
</style>
</head>
<body>
    <header>
        <h1>Jyutping AI 🇭🇰</h1>
        <button id="adminBtn" class="btn-secondary">⚙️ Admin / JSON</button>
    </header>

    <main>
        <section class="duvi-os-panel" style="background: #e5e5ea; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">⚡ Modo IA & Créditos: <span id="creditCount">20</span></h3>
                <a href="https://paypal.me/TU_LINK_PAYPAL" target="_blank" class="btn-secondary" style="text-decoration: none; display: inline-block; background: #FFCC00; color: #333;">☕ Invítame a un café</a>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="password" id="geminiKey" placeholder="Tu API Key de Gemini..." style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
                <input type="password" id="groqKey" placeholder="Tu API Key de Groq..." style="flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ccc;">
            </div>
            <button id="saveKeysBtn" class="btn-primary" style="background: #34C759;">Guardar Configuración</button>
        </section>
        <section class="input-section">
            <textarea id="userInput" placeholder="Escribe en español, inglés, o jyutping..."></textarea>
            <div class="api-selector">
                <label><input type="radio" name="api" value="gemini" checked> Gemini</label>
                <label><input type="radio" name="api" value="groq"> Groq</label>
            </div>
            <button id="translateBtn" class="btn-primary">Traducir con IA</button>
        </section>

        <section class="visual-map-section" id="visualMapArea">
            </section>

        <section class="output-section" id="outputArea">
            <div class="lang-row"><strong>Cantonés:</strong> <span id="outCantonese"></span></div>
            <div class="lang-row"><strong>Mandarín:</strong> <span id="outMandarin"></span></div>
            <div class="lang-row"><strong>Inglés:</strong> <span id="outEnglish"></span></div>
            <div class="lang-row"><strong>Español:</strong> <span id="outSpanish"></span></div>
        </section>

        <section class="history-section">
            <div class="history-header">
                <h2>Progreso Guardado</h2>
                <button id="clearHistoryBtn" class="btn-danger">Borrar Todo</button>
            </div>
            <ul id="historyList"></ul>
        </section>
    </main>

    <script src="app.js">
        // --- 1. CONFIGURACIÓN DEL PROMPT DEL SISTEMA (M1 - M7) ---
const SYSTEM_PROMPT = `
M1- Actúa como un traductor de cantonés al estilo de la aplicación Cantonese Jyutping AI de la Apple store.
M2- Cuando te llegue mi prompt, da la respuesta lo más preciso posible: haz traducciones en este orden por línea de palabras: cantonés, mandarín, inglés y español.
M3- Haz las transcripciones precisas y bien estructuradas.
M4- Proporciona transcripciones en Jyutping para más de 20,000 caracteres chinos igual que la app.
M5- El objetivo es simular la experiencia de uso de la app proporcionando respuestas precisas por encima de Google Translate.
M6- Recordatorio: si me das definiciones o información, asegúrate de darme también la traducción del texto en jyutping.
M7- Basa tus respuestas en el diccionario jyutdictionary.com o cantoneseclass101.com.
INSTRUCCIÓN VISUAL: Al final de tu respuesta, si la frase tiene más de una palabra, genera un objeto JSON puro (sin formato markdown) que relacione cada palabra en español/inglés con su carácter exacto en cantonés para poder dibujar flechas direccionales en la UI.
`;

// --- 2. GESTIÓN DEL DOM ---
const translateBtn = document.getElementById('translateBtn');
const userInput = document.getElementById('userInput');
const historyList = document.getElementById('historyList');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
let lines = []; // Para guardar las flechas de LeaderLine

// --- 3. MULTI-API CALL (Simulada para integrar tus Keys luego) ---
async function fetchTranslation(text, api) {
    // Aquí pondrás tus endpoints de Gemini o Groq
    console.log(`Llamando a ${api} con el texto: ${text}`);
    
    // Simulación de respuesta de la IA (Estructura que debe devolver)
    return {
        cantonese: "你好",
        jyutping: "nei5 hou2",
        mandarin: "Nǐ hǎo (你好)",
        english: "Hello",
        spanish: "Hola",
        mapping: [
            { source: "Hola", target: "你好" } // Para las flechas
        ]
    };
}

// --- 4. FUNCIÓN PRINCIPAL DE TRADUCCIÓN ---
translateBtn.addEventListener('click', async () => {
    const text = userInput.value.trim();
    if (!text) return alert("Escribe algo para traducir");

    const selectedApi = document.querySelector('input[name="api"]:checked').value;
    
    // Limpiar flechas anteriores
    lines.forEach(line => line.remove());
    lines = [];

    try {
        translateBtn.innerText = "Traduciendo...";
        const response = await fetchTranslation(text, selectedApi);
        
        // Mostrar resultados
        document.getElementById('outCantonese').innerHTML = `<span id="target-0" class="jyut-t5">${response.cantonese} (${response.jyutping})</span>`;
        document.getElementById('outMandarin').innerText = response.mandarin;
        document.getElementById('outEnglish').innerText = response.english;
        document.getElementById('outSpanish').innerHTML = `<span id="source-0">${response.spanish}</span>`;

        // Dibujar flecha (Ejemplo básico con LeaderLine)
        setTimeout(() => {
            const sourceEl = document.getElementById('source-0');
            const targetEl = document.getElementById('target-0');
            if (sourceEl && targetEl) {
                const line = new LeaderLine(sourceEl, targetEl, {
                    color: '#007AFF',
                    size: 3,
                    path: 'fluid',
                    startSocket: 'top',
                    endSocket: 'bottom'
                });
                lines.push(line);
            }
        }, 100);

        // Guardar en LocalStorage
        saveToHistory(text, response.cantonese);
        
    } catch (error) {
        console.error(error);
        alert("Error en la traducción");
    } finally {
        translateBtn.innerText = "Traducir con IA";
    }
});

// --- 5. LOCAL STORAGE Y PROGRESO ---
function loadHistory() {
    const history = JSON.parse(localStorage.getItem('jyutpingHistory')) || [];
    historyList.innerHTML = '';
    history.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <strong>${item.query}</strong> ➔ ${item.result} 
            <button onclick="deleteHistory(${index})" class="btn-danger" style="float:right; padding:5px;">Borrar</button>
        `;
        historyList.appendChild(li);
    });
}

function saveToHistory(query, result) {
    const history = JSON.parse(localStorage.getItem('jyutpingHistory')) || [];
    history.push({ query, result });
    localStorage.setItem('jyutpingHistory', JSON.stringify(history));
    loadHistory();
}

function deleteHistory(index) {
    const history = JSON.parse(localStorage.getItem('jyutpingHistory')) || [];
    history.splice(index, 1);
    localStorage.setItem('jyutpingHistory', JSON.stringify(history));
    loadHistory();
}

clearHistoryBtn.addEventListener('click', () => {
    if(confirm("¿Seguro que quieres borrar todo el progreso?")) {
        localStorage.removeItem('jyutpingHistory');
        loadHistory();
    }
});

// Cargar historial al iniciar
loadHistory();
    </script>
</body>
</html>
